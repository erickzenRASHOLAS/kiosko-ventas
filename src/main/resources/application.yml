server:
  port: 8082
  servlet:
    context-path: /api

spring:
  profiles:
    active: ${ENV:dev}
  application:
    name: ventas
  datasource:
    url: jdbc:mysql://localhost:3306/kiosko_ventas?createDatabaseIfNotExist=true
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    root: WARN
    org:
      springframework:
        web: DEBUG
      flywaydb: DEBUG
    cl:
      duoc:
        kiosko: TRACE
  file:
    name: ventas-app.log
    path: ./logs

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html
  show-hateoas: false

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA-SERVER}/eureka/ # La dirección de tu Eureka Server
  instance:
    prefer-ip-address: true # Permite que se registren usando la IP, ideal para Docker