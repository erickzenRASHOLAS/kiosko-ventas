server.port=8082
server.servlet.context-path=/api

spring.profiles.active=${ENV}
spring.application.name=ventas
spring.datasource.url=jdbc:mysql://localhost:3306/kiosko_ventas?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=caca

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=DEBUG
spring.flyway.locations=classpath:db/migration

logging.level.root=WARN
logging.level.org.springframework.web=DEBUG
logging.level.cl.duoc.kiosko=TRACE
logging.file.name=ventas-app.log
logging.file.path=./logs

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

springdoc.show-hateoas=false